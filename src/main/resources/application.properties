# Server
server.servlet.context-path=/api/v1
server.port=8000

# Spring
spring.application.name=PlanifySpring
spring.web.resources.add-mappings=false
logging.level.org.springframework.security=DEBUG

# Database
# [ENV] spring.datasource.url=...
# [ENV] spring.datasource.username=...
# [ENV] spring.datasource.password=...
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# spring.liquibase.clear-checksums=true

# Redis
# [ENV] spring.data.redis.host=...
# [ENV] spring.data.redis.port=...
# [ENV] spring.data.redis.database=...

# Cache
spring.cache.type=redis

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/v3/api-docs
